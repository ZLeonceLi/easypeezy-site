<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Easy Peezy · Tous nos liens</title>
<meta name="description" content="Retrouvez tous les liens Easy Peezy : réseaux sociaux, dernier article et site officiel." />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="apple-touch-icon" href="assets/logo.png" />
<style>
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-Regular.woff2") format("woff2");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-Medium.woff2") format("woff2");font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-SemiBold.woff2") format("woff2");font-weight:600;font-style:normal;font-display:swap}
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-Bold.woff2") format("woff2");font-weight:700;font-style:normal;font-display:swap}

:root{
  --navy:#254368;
  --baby:#bed7f2;
  --butter:#fff8ba;
  --crimson:#df0450;
  --cream:#fffdf3;
  --cream-2:#fff7e6;
  --ink:#22303f;
  --muted:#5b6b7d;
  --sans:"HK Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:linear-gradient(160deg,var(--baby) 0%,var(--cream) 45%,var(--cream-2) 100%);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  padding:3rem 1.2rem 2.2rem;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.page{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}

.avatar{
  width:104px;height:104px;border-radius:50%;
  object-fit:cover;background:#fff;
  border:3px solid var(--navy);
  box-shadow:5px 5px 0 var(--navy);
  padding:6px;
}

h1{
  font-size:1.5rem;font-weight:700;letter-spacing:-.02em;
  color:var(--navy);margin-top:1.1rem;text-align:center;
}

.bio{
  font-size:.95rem;color:var(--muted);font-weight:500;
  margin-top:.4rem;text-align:center;max-width:320px;
}

.links{
  width:100%;display:flex;flex-direction:column;gap:.85rem;
  margin-top:1.8rem;
}

.link-btn{
  display:flex;align-items:center;gap:.85rem;
  width:100%;padding:.95rem 1.2rem;
  background:var(--cream);
  border:2px solid var(--navy);
  border-radius:16px;
  font-weight:600;font-size:.98rem;color:var(--navy);
  box-shadow:4px 4px 0 var(--navy);
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease;
}
.link-btn:hover,.link-btn:focus-visible{
  transform:translate(-2px,-2px);
  box-shadow:6px 6px 0 var(--navy);
  background:var(--crimson);
  color:#fff;
}
.link-btn:active{transform:translate(0,0);box-shadow:2px 2px 0 var(--navy)}

.link-btn .ic{
  flex-shrink:0;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
}
.link-btn .ic svg{width:100%;height:100%}
.link-btn span.label{flex:1}

.link-btn--primary{
  background:var(--crimson);color:#fff;border-color:var(--crimson);
}
.link-btn--primary:hover{
  background:var(--navy);border-color:var(--navy);color:var(--butter);
}

.socials{
  display:flex;gap:1.3rem;margin-top:2.4rem;
}
.socials a{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--navy);opacity:.65;
  transition:opacity .16s ease, transform .16s ease, color .16s ease;
}
.socials a svg{width:19px;height:19px}
.socials a:hover{opacity:1;transform:translateY(-2px);color:var(--crimson)}

footer{
  margin-top:1.8rem;font-size:.78rem;color:var(--muted);
  text-align:center;
}

.drops-widget{
  width:100%;margin-top:2rem;display:flex;flex-direction:column;align-items:center;text-align:center;
  background:var(--cream);border:2px solid var(--navy);border-radius:20px;
  box-shadow:5px 5px 0 var(--navy);padding:1.6rem 1.4rem 1.4rem;
}
.drops-widget__mascot-btn{background:none;border:0;padding:0;cursor:pointer;width:88px;line-height:0}
.drops-widget__mascot{width:100%;filter:drop-shadow(0 8px 14px rgba(37,67,104,.28));transition:transform .18s ease}
.drops-widget__mascot-btn:hover .drops-widget__mascot{transform:translateY(-3px) rotate(-4deg)}
.drops-widget__mascot-btn:active .drops-widget__mascot{transform:translateY(2px) scale(.94) rotate(2deg)}
.drops-widget__mascot-btn:disabled{cursor:not-allowed}
.drops-widget__mascot-btn:disabled .drops-widget__mascot{transform:none!important;opacity:.7}
.drops-widget__hint{margin-top:.5rem;font-size:.74rem;color:var(--muted)}
.drops-widget__email-form{width:100%;max-width:280px;margin-top:.8rem}
.drops-widget__email-row{display:flex;gap:.4rem}
.drops-widget__email-input{flex:1;min-width:0;font-family:var(--sans);font-size:.85rem;padding:.6rem .8rem;border:2px solid var(--navy);border-radius:10px;background:#fff;color:var(--ink)}
.drops-widget__email-input:focus{outline:none;box-shadow:3px 3px 0 var(--crimson)}
.drops-widget__email-note{margin-top:.5rem;font-size:.76rem;color:var(--navy)}
.drops-widget__funnel{position:relative;width:140px;height:150px;margin:.8rem 0 0}
.drops-widget__funnel-img{width:100%;height:100%;object-fit:contain;object-position:bottom;filter:drop-shadow(0 4px 8px rgba(37,67,104,.2))}
.drops-widget__jar{width:180px;margin:0 auto;background:transparent;border:2px solid var(--navy);border-top:0;border-radius:0 0 20px 20px;overflow:hidden}
.drops-widget__jar-canvas{display:block;width:180px;height:150px}
.drops-widget__count{font-size:.95rem;color:var(--navy);margin-top:.9rem}
.drops-widget__count strong{font-size:1.3rem;color:var(--crimson);margin-right:.3rem}
.drops-widget__progress{margin-top:.4rem;font-size:.78rem;color:var(--muted)}
.drops-widget__share{
  margin-top:.8rem;background:none;border:0;color:var(--navy);
  font-weight:600;font-size:.82rem;text-decoration:underline;cursor:pointer;font-family:var(--sans);
}
.drops-widget__toast{
  margin-top:1rem;background:var(--butter);border:2px solid var(--navy);border-radius:12px;
  padding:.7rem .9rem;font-size:.8rem;font-weight:600;color:var(--navy);
  opacity:0;transform:translateY(6px);transition:opacity .3s ease,transform .3s ease;
}
.drops-widget__toast.is-visible{opacity:1;transform:none}
.drops-widget__fund{
  margin-top:1.1rem;padding-top:.9rem;border-top:1px solid rgba(37,67,104,.15);
  font-size:.76rem;color:var(--muted);line-height:1.5;
}
.drops-widget__fund a{color:var(--crimson);font-weight:700;text-decoration:underline}

</style>
</head>
<body>
<main class="page">

  <img class="avatar" src="assets/logo.png" alt="Easy Peezy" />

  <h1>Easy Peezy</h1>
  <p class="bio">Moins d'attente aux toilettes, plus de confort dans vos festivals</p>

    <a href="mailto:easypeezy.ep@gmail.com" aria-label="Email">

  <footer>© 2026 Easy Peezy</footer>

</html>
