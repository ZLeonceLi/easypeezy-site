<style>
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-Regular.woff2") format("woff2");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-Medium.woff2") format("woff2");font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-SemiBold.woff2") format("woff2");font-weight:600;font-style:normal;font-display:swap}
@font-face{font-family:"HK Grotesk";src:url("assets/fonts/HKGrotesk-Bold.woff2") format("woff2");font-weight:700;font-style:normal;font-display:swap}

:root{
  --navy:#254368;
  --baby:#bed7f2;
  --butter:#fff8ba;
  --crimson:#df0450;
  --cream:#fffdf3;
  --cream-2:#fff7e6;
  --ink:#22303f;
  --muted:#5b6b7d;
  --sans:"HK Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:linear-gradient(160deg,var(--baby) 0%,var(--cream) 45%,var(--cream-2) 100%);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  padding:3rem 1.2rem 2.2rem;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.page{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}

.avatar{
  width:104px;height:104px;border-radius:50%;
  object-fit:cover;background:#fff;
  border:3px solid var(--navy);
  box-shadow:5px 5px 0 var(--navy);
  padding:6px;
}

h1{
  font-size:1.5rem;font-weight:700;letter-spacing:-.02em;
  color:var(--navy);margin-top:1.1rem;text-align:center;
}

.bio{
  font-size:.95rem;color:var(--muted);font-weight:500;
  margin-top:.4rem;text-align:center;max-width:320px;
}

.links{
  width:100%;display:flex;flex-direction:column;gap:.85rem;
  margin-top:1.8rem;
}

.link-btn{
  display:flex;align-items:center;gap:.85rem;
  width:100%;padding:.95rem 1.2rem;
  background:var(--cream);
  border:2px solid var(--navy);
  border-radius:16px;
  font-weight:600;font-size:.98rem;color:var(--navy);
  box-shadow:4px 4px 0 var(--navy);
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease;
}
.link-btn:hover,.link-btn:focus-visible{
  transform:translate(-2px,-2px);
  box-shadow:6px 6px 0 var(--navy);
  background:var(--crimson);
  color:#fff;
}
.link-btn:active{transform:translate(0,0);box-shadow:2px 2px 0 var(--navy)}

.link-btn .ic{
  flex-shrink:0;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
}
.link-btn .ic svg{width:100%;height:100%}
.link-btn span.label{flex:1}

.link-btn--primary{
  background:var(--crimson);color:#fff;border-color:var(--crimson);
}
.link-btn--primary:hover{
  background:var(--navy);border-color:var(--navy);color:var(--butter);
}

.socials{
  display:flex;gap:1.3rem;margin-top:2.4rem;
}
.socials a{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--navy);opacity:.65;
  transition:opacity .16s ease, transform .16s ease, color .16s ease;
}
.socials a svg{width:19px;height:19px}
.socials a:hover{opacity:1;transform:translateY(-2px);color:var(--crimson)}

footer{
  margin-top:1.8rem;font-size:.78rem;color:var(--muted);
  text-align:center;
}
</style>
</head>
